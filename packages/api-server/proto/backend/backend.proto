syntax = "proto3";

package outbound;

service Metadata {
    rpc ProcessedBatchUpdate (ProcessedBatchRequest) returns (ProcessedBatchResponse);
}

// #258 Raw Posts callback — ai-server calls api-server after scraping a source.
// api-server UPSERTs raw_posts and updates raw_post_sources.last_scraped_at on SUCCESS.
service RawPostsCallback {
    rpc ReportRawPostsFetched (ReportRawPostsFetchedRequest) returns (ReportRawPostsFetchedResponse);
}

enum RawPostsFetchStatus {
    RAW_POSTS_FETCH_STATUS_UNSPECIFIED = 0;
    RAW_POSTS_FETCH_STATUS_SUCCESS = 1;
    RAW_POSTS_FETCH_STATUS_PARTIAL = 2;
    RAW_POSTS_FETCH_STATUS_FAILED = 3;
}

message RawPostResult {
    string external_id = 1;
    string external_url = 2;
    string image_url = 3;       // plaform CDN url (source)
    string r2_key = 4;          // key within the raw-posts bucket
    string r2_url = 5;          // public URL to stored copy
    optional string caption = 6;
    optional string author_name = 7;
    string platform_metadata_json = 8; // JSON string; api-server parses into jsonb
}

message ReportRawPostsFetchedRequest {
    string source_id = 1;
    string dispatch_id = 2;
    string platform = 3;
    repeated RawPostResult raw_posts = 4;
    int32 fetched_count = 5;
    RawPostsFetchStatus status = 6;
    string error_message = 7;
}

message ReportRawPostsFetchedResponse {
    bool received = 1;
    int32 upserted_count = 2;
}

message QAPair {
    string question = 1;
    string answer = 2;
}

message LinkMetadata {
    string summary = 1;
    repeated QAPair qna = 2;
    map<string, string> metadata = 3;
    repeated string citations = 4;
    repeated string keywords = 5;
    string link_type = 6;  // product, article, video, other
}

// Batch processing messages
message BatchItemResult {
    string item_id = 1;
    string url = 2;
    string type = 3;  // "link" or "image"
    string status = 4;  // "success", "partial", "failed"
    optional string error_message = 5;

    // Results
    optional LinkMetadata link_metadata = 6;
}

message BatchStatistics {
    int32 total_count = 1;
    int32 success_count = 2;
    int32 partial_count = 3;
    int32 failed_count = 4;
    double processing_time_seconds = 5;
}

message ProcessedBatchRequest {
    string batch_id = 1;
    int64 processing_timestamp = 2;
    repeated BatchItemResult results = 3;
    BatchStatistics statistics = 4;
}

message ProcessedBatchResponse {
    bool success = 1;
    string message = 2;
    int32 processed_count = 3;
}
