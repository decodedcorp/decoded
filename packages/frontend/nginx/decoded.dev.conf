# nginx configuration for decoded.dev

# HTTP server - redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name decoded.dev;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server - proxy to Next.js on port 3000
server {
    listen 443 ssl http2;
    server_name decoded.dev;

    # SSL certificate paths (Cloudflare Origin Certificate)
    ssl_certificate     /etc/nginx/ssl/decoded.dev.crt;
    ssl_certificate_key /etc/nginx/ssl/decoded.dev.key;

    # SSL configuration optimized for Cloudflare Origin certificates
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy settings for Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # Essential proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host   $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        
        # WebSocket support (for Next.js HMR and other WebSocket features)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        
        # Timeouts
        proxy_connect_timeout       60s;
        proxy_send_timeout          60s;
        proxy_read_timeout          60s;
        
        # Buffer settings
        proxy_buffering             off;
        proxy_request_buffering     off;
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

