server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.service"]
    relabel_configs:
      # 컨테이너 이름 추출
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # 서비스 이름 추출 (docker-compose)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # 이미지 이름 추출
      - source_labels: ['__meta_docker_container_label_com_docker_compose_image']
        target_label: 'image'
      # 로그 스트림 (stdout/stderr)
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      # 환경 추출 (docker-compose project name에서)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'environment'
      # JSON 로그 파싱 (Rust tracing JSON 포맷)
      - source_labels: ['__line__']
        regex: '^\s*\{.*"level".*\}'
        target_label: 'log_format'
        replacement: 'json'
      # 텍스트 로그 (fallback)
      - source_labels: ['__line__']
        regex: '.*'
        target_label: 'log_format'
        replacement: 'text'
    pipeline_stages:
      # JSON 로그 파싱
      - json:
          expressions:
            level: level
            message: message
            target: target
            request_id: request_id
            method: method
            uri: uri
            status: status
            duration_ms: duration_ms
            service: service
            environment: environment
      # JSON 파싱 실패 시 텍스트로 처리
      - labels:
          level:
          request_id:
          method:
          uri:
          status:
          duration_ms:
          service:
          environment:
      # 로그 레벨 정규화
      - match:
          selector: '{log_format="json"}'
          stages:
            - labels:
                level:
      # 메시지 필드 추출
      - output:
          source: message

