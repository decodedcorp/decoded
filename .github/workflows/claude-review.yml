name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        id: claude-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR. Focus on bugs, security issues, and performance problems.
            Write your review as PR comments in Korean.

      - name: Notify Telegram on review completion
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -eo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not set, skipping notification"
            exit 0
          fi

          esc() { echo "$1" | sed 's/[_*[\]()~`>#+\-=|{}.!\\]/\\&/g'; }

          PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          PR_TITLE="${{ github.event.pull_request.title || github.event.issue.title }}"
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          URL="${{ github.server_url }}/${REPO}/pull/${PR_NUM}"

          if [ "$STATUS" = "success" ]; then
            MSG_TEXT="$(cat <<MSGEOF
          🤖 *DECODED \\| Code Review Complete*

          ✅ PR \\#${PR_NUM} 리뷰 완료
          📋 *$(esc "$PR_TITLE")*
          🔗 [PR 보기]($(esc "$URL"))
          MSGEOF
          )"
          else
            MSG_TEXT="$(cat <<MSGEOF
          🤖 *DECODED \\| Code Review Failed*

          ❌ PR \\#${PR_NUM} 리뷰 실패
          📋 *$(esc "$PR_TITLE")*
          🔗 [PR 보기]($(esc "$URL"))
          MSGEOF
          )"
          fi

          MSG_TEXT=$(echo "$MSG_TEXT" | sed 's/^[[:space:]]*//')

          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MSG_TEXT" \
            '{chat_id: $chat_id, text: ($text | if length > 4096 then .[0:4096] else . end), parse_mode: "MarkdownV2", disable_web_page_preview: true}')

          RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "$RESP" | jq .

          if ! echo "$RESP" | jq -e '.ok == true' >/dev/null 2>&1; then
            echo "MarkdownV2 failed, retrying as plain text..."
            PLAIN="$(echo "$MSG_TEXT" | sed 's/\\//g; s/\*//g; s/`//g; s/\[//g; s/\]//g; s/(//g; s/)//g')"
            PAYLOAD=$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$PLAIN" '{chat_id: $chat_id, text: $text}')
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" -d "$PAYLOAD" | jq .
          fi
