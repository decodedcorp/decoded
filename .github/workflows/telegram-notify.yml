# Sends repository events to Telegram with MarkdownV2 formatting.
# Required repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
name: Telegram notify

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened]
  issues:
    types: [opened]
  deployment_status:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::error::Set repository secrets TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID"
            exit 1
          fi

          # MarkdownV2 escape helper
          esc() { echo "$1" | sed 's/[_*[\]()~`>#+\-=|{}.!\\]/\\&/g'; }

          REPO="${{ github.repository }}"
          SERVER="${{ github.server_url }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          REF="${{ github.ref }}"
          RUN_URL="${SERVER}/${REPO}/actions/runs/${{ github.run_id }}"
          PARSE_MODE="MarkdownV2"

          case "$EVENT_NAME" in
            workflow_dispatch)
              MSG_TEXT="$(cat <<MSGEOF
          🔧 *DECODED \\| Manual Trigger*

          👤 $(esc "$ACTOR")
          🔗 [Actions Run]($(esc "$RUN_URL"))
          MSGEOF
          )"
              ;;

            push)
              SHORT="${SHA:0:7}"
              BRANCH="${REF#refs/heads/}"
              COMMIT_MSG=$(jq -r '.head_commit.message // empty' "$GITHUB_EVENT_PATH" | head -1 | head -c 200)
              COMMIT_URL="${SERVER}/${REPO}/commit/${SHA}"
              MSG_TEXT="$(cat <<MSGEOF
          📦 *DECODED \\| Push*

          🌿 \`$(esc "$BRANCH")\`
          📝 \`$(esc "$SHORT")\` $(esc "$COMMIT_MSG")
          👤 $(esc "$ACTOR")
          🔗 [커밋 보기]($(esc "$COMMIT_URL"))
          MSGEOF
          )"
              ;;

            pull_request)
              NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
              TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
              HEAD=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
              BASE=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
              AUTHOR=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")
              URL=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")
              ADDITIONS=$(jq -r '.pull_request.additions // 0' "$GITHUB_EVENT_PATH")
              DELETIONS=$(jq -r '.pull_request.deletions // 0' "$GITHUB_EVENT_PATH")
              CHANGED=$(jq -r '.pull_request.changed_files // 0' "$GITHUB_EVENT_PATH")
              MSG_TEXT="$(cat <<MSGEOF
          🔀 *DECODED \\| New PR \\#${NUM}*

          📋 *$(esc "$TITLE")*
          🌿 \`$(esc "$HEAD")\` → \`$(esc "$BASE")\`
          👤 $(esc "$AUTHOR")
          📊 \`\\+${ADDITIONS}\` \`\\-${DELETIONS}\` \\(${CHANGED} files\\)
          🔗 [PR 보기]($(esc "$URL"))
          MSGEOF
          )"
              ;;

            issues)
              NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
              TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
              AUTHOR=$(jq -r '.issue.user.login' "$GITHUB_EVENT_PATH")
              URL=$(jq -r '.issue.html_url' "$GITHUB_EVENT_PATH")
              LABELS=$(jq -r '[.issue.labels[].name] | join(", ")' "$GITHUB_EVENT_PATH")
              MSG_TEXT="$(cat <<MSGEOF
          📌 *DECODED \\| New Issue \\#${NUM}*

          📋 *$(esc "$TITLE")*
          👤 $(esc "$AUTHOR")
          🏷️ \`$(esc "${LABELS:-none}")\`
          🔗 [이슈 보기]($(esc "$URL"))
          MSGEOF
          )"
              ;;

            deployment_status)
              STATE=$(jq -r '.deployment_status.state' "$GITHUB_EVENT_PATH")
              ENV_NAME=$(jq -r '.deployment_status.environment // "unknown"' "$GITHUB_EVENT_PATH")
              TARGET_URL=$(jq -r '.deployment_status.target_url // ""' "$GITHUB_EVENT_PATH")
              DEPLOY_REF=$(jq -r '.deployment.ref // ""' "$GITHUB_EVENT_PATH")

              if [ "$STATE" != "success" ] && [ "$STATE" != "failure" ] && [ "$STATE" != "error" ]; then
                echo "Skipping deployment_status state: ${STATE}"
                exit 0
              fi

              if [ "$STATE" = "success" ]; then
                HEADER="🚀 *DECODED \\| Deploy Success*"
                STATUS_LINE="✅ *$(esc "$ENV_NAME")* 배포 완료"
              else
                HEADER="💥 *DECODED \\| Deploy Failed*"
                STATUS_LINE="❌ *$(esc "$ENV_NAME")* 배포 실패"
              fi

              LINK_LINE=""
              if [ -n "$TARGET_URL" ] && [ "$TARGET_URL" != "null" ]; then
                LINK_LINE="🔗 [배포 확인]($(esc "$TARGET_URL"))"
              fi

              MSG_TEXT="$(cat <<MSGEOF
          ${HEADER}

          ${STATUS_LINE}
          🌿 \`$(esc "$DEPLOY_REF")\`
          👤 $(esc "$ACTOR")
          ${LINK_LINE}
          MSGEOF
          )"
              ;;

            *)
              echo "::error::Unhandled event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

          # Remove leading whitespace from heredoc
          MSG_TEXT=$(echo "$MSG_TEXT" | sed 's/^[[:space:]]*//')

          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MSG_TEXT" \
            --arg parse_mode "$PARSE_MODE" \
            '{chat_id: $chat_id, text: ($text | if length > 4096 then .[0:4096] else . end), parse_mode: $parse_mode, disable_web_page_preview: true}')

          RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "$RESP" | jq .

          # If MarkdownV2 fails, retry as plain text
          if ! echo "$RESP" | jq -e '.ok == true' >/dev/null 2>&1; then
            echo "MarkdownV2 failed, retrying as plain text..."
            PLAIN_TEXT=$(echo "$MSG_TEXT" | sed 's/\\//g; s/\*//g; s/`//g; s/\[//g; s/\]//g; s/(//g; s/)//g')
            PAYLOAD=$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$PLAIN_TEXT" \
              '{chat_id: $chat_id, text: $text}')
            RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "$RESP" | jq .
            echo "$RESP" | jq -e '.ok == true' >/dev/null || exit 1
          fi
